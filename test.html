<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
  </head>
  <body>
    <div id="commands">
      <form>
	<ul>
	  <li><input id="newItem" name="newItem" type="text">
            <input name="push" type="button" value="push"></li>
	</ul>
      </form>
    </div>

    <div id="contents">
      <h1>Messages</h1>
      <ul id="lifo">
      </ul>
    </div>

    <script>
     // Create WebSocket connection.
     const socket = new WebSocket("ws://localhost:8002");

     function push(text) {
       const ul = document.getElementById("lifo");
       const li = document.createElement("li");
       li.appendChild(document.createTextNode(text));
       ul.appendChild(li);
     }

     function send() {
       const text = document.getElementById("newItem");
       if (text.value != "") {
         socket.send(text.value);
         text.value = "";
       }
     }

     function key_send(event) {
       if (event.keyCode == 13) {
         event.preventDefault();
         send();
       }
     }

     window.addEventListener("load", () => {
       const newItem = document.getElementById("newItem");
       newItem.addEventListener("keypress", key_send, false);

       const push = document.querySelector("#commands [name='push']");
       push.addEventListener("click", send);
     });

     // Listen for messages
     socket.addEventListener("message", (event) => {
       push(event.data);
     });
    </script>
  </body>
</html>
